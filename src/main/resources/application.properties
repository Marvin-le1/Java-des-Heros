# ===================================================
# Application
# ===================================================
spring.application.name=java-des-heros
server.port=8080

# ===================================================
# Base de données MySQL
# ===================================================
spring.datasource.url=jdbc:mysql://localhost:3306/java_des_heros?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================
# JPA / Hibernate
# ===================================================
# create-drop : recrée la BDD à chaque démarrage (utile en dev)
# update      : met à jour le schéma sans supprimer les données
# validate    : vérifie sans modifier (pour la prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================
# Thymeleaf
# ===================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===================================================
# Charset
# ===================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===================================================
# Logs
# ===================================================
logging.level.com.avengers=DEBUG
logging.level.org.springframework.security=INFO
