<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Crises — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>⚡ Crises</h1>
        <a th:href="@{/crises/nouveau}" class="btn btn-primary"
           sec:authorize="hasAnyAuthority('Gestionnaire Crises','Maitre Supreme')">
            + Nouvelle crise
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <form method="get" th:action="@{/crises}" style="margin-bottom:1rem;display:flex;gap:0.5rem;">
        <input type="text" name="q" th:value="${q}" placeholder="Rechercher par titre…"
               style="flex:1;padding:0.5rem;border:1px solid #ddd;border-radius:6px;">
        <button type="submit" class="btn btn-secondary">Rechercher</button>
        <a th:href="@{/crises}" class="btn btn-secondary">Réinitialiser</a>
    </form>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Titre</th>
                    <th>Type</th>
                    <th>Alerte</th>
                    <th>Statut</th>
                    <th>Mission liée</th>
                    <th>Héros concernés</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="crise : ${crises}">
                    <td th:text="${crise.id}"></td>
                    <td><strong th:text="${crise.titre}"></strong></td>
                    <td th:text="${crise.typeCrise}"></td>
                    <td>
                        <span th:text="${crise.niveauAlerte}"
                              th:classappend="${crise.niveauAlerte.name() == 'critique'} ? 'badge-danger' :
                                             (${crise.niveauAlerte.name() == 'eleve'} ? 'badge-warning' :
                                             (${crise.niveauAlerte.name() == 'modere'} ? 'badge-info' : 'badge-secondary'))"
                              class="badge"></span>
                    </td>
                    <td>
                        <span th:text="${crise.statut}"
                              th:classappend="${crise.statut.name() == 'ouverte'} ? 'badge-danger' :
                                             (${crise.statut.name() == 'en_cours'} ? 'badge-warning' : 'badge-success')"
                              class="badge"></span>
                    </td>
                    <td>
                        <a th:if="${crise.mission != null}"
                           th:href="@{/missions/{id}(id=${crise.mission.id})}"
                           th:text="${crise.mission.titre}"></a>
                        <span th:if="${crise.mission == null}" style="color:#999;">—</span>
                    </td>
                    <td th:text="${crise.herosConcernes.size() + ' héros'}"></td>
                    <td>
                        <a th:href="@{/crises/{id}(id=${crise.id})}" class="btn btn-sm btn-secondary">Voir</a>
                        <a th:href="@{/crises/{id}/modifier(id=${crise.id})}" class="btn btn-sm btn-primary"
                           sec:authorize="hasAnyAuthority('Gestionnaire Crises','Maitre Supreme')">Modifier</a>
                        <form th:action="@{/crises/{id}/supprimer(id=${crise.id})}" method="post" style="display:inline"
                              sec:authorize="hasAuthority('Maitre Supreme')">
                            <button type="submit" class="btn btn-sm btn-danger btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(crises)}">
                    <td colspan="8" style="text-align:center;color:#999;">Aucune crise enregistrée.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
