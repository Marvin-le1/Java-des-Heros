<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${isNew} ? 'Nouveau civil' : 'Modifier civil' + ' — Java des Héros'">Civil</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1 th:text="${isNew} ? '👤 Nouveau civil' : '✏️ Modifier le civil'">Civil</h1>
        <a th:href="@{/civils}" class="btn btn-secondary">← Retour</a>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="form-container">
        <form th:action="@{/civils/sauvegarder}" th:object="${civil}" method="post">
            <input type="hidden" th:field="*{id}">

            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label for="civilite">Civilité</label>
                    <select id="civilite" th:field="*{civilite}" class="form-control">
                        <option value="">—</option>
                        <option value="M.">M.</option>
                        <option value="Mme">Mme</option>
                        <option value="Mx">Mx</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="prenom">Prénom *</label>
                    <input type="text" id="prenom" th:field="*{prenom}" class="form-control" required>
                    <span th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}" class="field-error"></span>
                </div>
                <div class="form-group">
                    <label for="nom">Nom *</label>
                    <input type="text" id="nom" th:field="*{nom}" class="form-control" required>
                    <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="field-error"></span>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control"
                           placeholder="exemple@email.com">
                </div>
                <div class="form-group">
                    <label for="telephone">Téléphone</label>
                    <input type="text" id="telephone" th:field="*{telephone}" class="form-control"
                           placeholder="06 xx xx xx xx">
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label for="dateNaissance">Date de naissance</label>
                    <input type="date" id="dateNaissance" th:field="*{dateNaissance}" class="form-control">
                </div>
                <div class="form-group">
                    <label for="nationalite">Nationalité</label>
                    <input type="text" id="nationalite" th:field="*{nationalite}" class="form-control"
                           placeholder="Ex : Américaine">
                </div>
            </div>

            <div class="form-group">
                <label for="adressePostale">Adresse postale</label>
                <textarea id="adressePostale" th:field="*{adressePostale}" class="form-control" rows="2"
                          placeholder="123 Rue des Héros, New York"></textarea>
            </div>

            <div class="form-group">
                <label for="dateDeces">Date de décès (si applicable)</label>
                <input type="date" id="dateDeces" th:field="*{dateDeces}" class="form-control">
            </div>

            <div class="form-group">
                <label for="commentaire">Commentaire</label>
                <textarea id="commentaire" th:field="*{commentaire}" class="form-control" rows="3"
                          placeholder="Notes sur ce civil…"></textarea>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                <a th:href="@{/civils}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
