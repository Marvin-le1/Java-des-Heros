<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Civils — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>👤 Civils</h1>
        <a th:href="@{/civils/nouveau}" class="btn btn-primary"
           sec:authorize="hasAnyAuthority('Gestionnaire Civils','Maitre Supreme')">
            + Nouveau civil
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <form method="get" th:action="@{/civils}" style="margin-bottom:1rem;display:flex;gap:0.5rem;">
        <input type="text" name="q" th:value="${q}" placeholder="Rechercher par nom, email…"
               style="flex:1;padding:0.5rem;border:1px solid #ddd;border-radius:6px;">
        <button type="submit" class="btn btn-secondary">Rechercher</button>
        <a th:href="@{/civils}" class="btn btn-secondary">Réinitialiser</a>
    </form>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nom complet</th>
                    <th>Email</th>
                    <th>Téléphone</th>
                    <th>Nationalité</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="civil : ${civils}">
                    <td th:text="${civil.id}"></td>
                    <td><strong th:text="${civil.nomComplet}"></strong></td>
                    <td th:text="${civil.email ?: '—'}"></td>
                    <td th:text="${civil.telephone ?: '—'}"></td>
                    <td th:text="${civil.nationalite ?: '—'}"></td>
                    <td>
                        <a th:href="@{/civils/{id}(id=${civil.id})}" class="btn btn-sm btn-secondary">Voir</a>
                        <a th:href="@{/civils/{id}/modifier(id=${civil.id})}" class="btn btn-sm btn-primary"
                           sec:authorize="hasAnyAuthority('Gestionnaire Civils','Maitre Supreme')">Modifier</a>
                        <form th:action="@{/civils/{id}/supprimer(id=${civil.id})}" method="post" style="display:inline"
                              sec:authorize="hasAuthority('Maitre Supreme')">
                            <button type="submit" class="btn btn-sm btn-danger btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(civils)}">
                    <td colspan="6" style="text-align:center;color:#999;">Aucun civil trouvé.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
