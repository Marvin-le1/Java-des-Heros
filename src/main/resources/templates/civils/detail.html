<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${civil.nomComplet} + ' — Java des Héros'">Civil</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>👤 <span th:text="${civil.nomComplet}"></span></h1>
        <div>
            <a th:href="@{/civils/{id}/modifier(id=${civil.id})}" class="btn btn-primary"
               sec:authorize="hasAnyAuthority('Gestionnaire Civils','Maitre Supreme')">Modifier</a>
            <a th:href="@{/civils}" class="btn btn-secondary">← Retour</a>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1rem;">

        <div style="background:white;border-radius:8px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <h2>Informations personnelles</h2>
            <table style="width:100%;margin-top:1rem;">
                <tr>
                    <td style="font-weight:600;padding:0.4rem 0;width:40%;">Civilité</td>
                    <td th:text="${civil.civilite ?: '—'}"></td>
                </tr>
                <tr>
                    <td style="font-weight:600;padding:0.4rem 0;">Prénom</td>
                    <td th:text="${civil.prenom}"></td>
                </tr>
                <tr>
                    <td style="font-weight:600;padding:0.4rem 0;">Nom</td>
                    <td th:text="${civil.nom}"></td>
                </tr>
                <tr>
                    <td style="font-weight:600;padding:0.4rem 0;">Nationalité</td>
                    <td th:text="${civil.nationalite ?: '—'}"></td>
                </tr>
                <tr th:if="${civil.dateNaissance}">
                    <td style="font-weight:600;padding:0.4rem 0;">Naissance</td>
                    <td th:text="${#temporals.format(civil.dateNaissance, 'dd/MM/yyyy')}"></td>
                </tr>
                <tr th:if="${civil.dateDeces}">
                    <td style="font-weight:600;padding:0.4rem 0;">Décès</td>
                    <td th:text="${#temporals.format(civil.dateDeces, 'dd/MM/yyyy')}" style="color:#dc3545;"></td>
                </tr>
            </table>
        </div>

        <div style="background:white;border-radius:8px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <h2>Contact & Adresse</h2>
            <table style="width:100%;margin-top:1rem;">
                <tr>
                    <td style="font-weight:600;padding:0.4rem 0;width:40%;">Email</td>
                    <td th:text="${civil.email ?: '—'}"></td>
                </tr>
                <tr>
                    <td style="font-weight:600;padding:0.4rem 0;">Téléphone</td>
                    <td th:text="${civil.telephone ?: '—'}"></td>
                </tr>
                <tr th:if="${civil.adressePostale}">
                    <td style="font-weight:600;padding:0.4rem 0;">Adresse</td>
                    <td th:text="${civil.adressePostale}" style="white-space:pre-line;"></td>
                </tr>
            </table>
        </div>
    </div>

    <div th:if="${civil.commentaire}"
         style="background:white;border-radius:8px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-top:1.5rem;">
        <h2>📝 Commentaire</h2>
        <p th:text="${civil.commentaire}" style="margin-top:0.75rem;white-space:pre-line;"></p>
    </div>

    <div style="margin-top:2rem;" sec:authorize="hasAuthority('Maitre Supreme')">
        <form th:action="@{/civils/{id}/supprimer(id=${civil.id})}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-danger btn-delete">🗑️ Supprimer ce civil</button>
        </form>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
