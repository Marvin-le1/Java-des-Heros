<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Super-vilains — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>🦹 Super-vilains</h1>
        <a th:href="@{/supervilains/nouveau}" class="btn btn-primary"
           sec:authorize="hasAnyAuthority('Gestionnaire Super-Vilains','Maitre Supreme')">
            + Nouveau vilain
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- Barre de recherche -->
    <form method="get" th:action="@{/supervilains}" style="margin-bottom:1rem;display:flex;gap:0.5rem;">
        <input type="text" name="q" th:value="${q}" placeholder="Rechercher par nom ou pouvoir…"
               style="flex:1;padding:0.5rem;border:1px solid #ddd;border-radius:6px;">
        <button type="submit" class="btn btn-secondary">Rechercher</button>
        <a th:href="@{/supervilains}" class="btn btn-secondary">Réinitialiser</a>
    </form>

    <!-- Tableau des vilains -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nom du vilain</th>
                    <th>Identité secrète</th>
                    <th>Pouvoir</th>
                    <th>Degré de malveillance ☠️</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="vilain : ${vilains}">
                    <td th:text="${vilain.id}"></td>
                    <td><strong th:text="${vilain.nom}"></strong></td>
                    <td th:text="${vilain.identiteSecrete != null ? vilain.identiteSecrete.nomComplet : '??? Inconnue'}"></td>
                    <td th:text="${vilain.pouvoir != null ? #strings.abbreviate(vilain.pouvoir, 50) : '-'}"></td>
                    <td>
                        <span th:text="${vilain.degreMalveillance}"></span>
                        <span th:if="${vilain.degreMalveillance >= 8}" style="color:#dc3545;font-weight:bold;"> ⚠️ DANGEREUX</span>
                    </td>
                    <td>
                        <a th:href="@{/supervilains/{id}(id=${vilain.id})}" class="btn btn-sm btn-secondary">Voir</a>
                        <a th:href="@{/supervilains/{id}/modifier(id=${vilain.id})}" class="btn btn-sm btn-primary"
                           sec:authorize="hasAnyAuthority('Gestionnaire Super-Vilains','Maitre Supreme')">Modifier</a>
                        <form th:action="@{/supervilains/{id}/supprimer(id=${vilain.id})}" method="post" style="display:inline"
                              sec:authorize="hasAuthority('Maitre Supreme')">
                            <button type="submit" class="btn btn-sm btn-danger btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(vilains)}">
                    <td colspan="6" style="text-align:center;color:#999;">Aucun super-vilain répertorié.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Top vilains les plus dangereux -->
    <div th:if="${!#lists.isEmpty(topVilains)}" style="margin-top:2rem;">
        <h2>☠️ Les plus dangereux</h2>
        <div class="table-container" style="margin-top:0.75rem;">
            <table>
                <thead>
                    <tr><th>Rang</th><th>Vilain</th><th>Degré de malveillance</th></tr>
                </thead>
                <tbody>
                    <tr th:each="vilain, stat : ${topVilains}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${vilain.nom}"></td>
                        <td th:text="${vilain.degreMalveillance}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
