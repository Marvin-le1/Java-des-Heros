<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Administration — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>⚙️ Administration — Utilisateurs</h1>
        <a th:href="@{/admin/nouveau}" class="btn btn-primary">+ Nouvel utilisateur</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- Tableau des utilisateurs -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Login</th>
                    <th>Email</th>
                    <th>Rôles</th>
                    <th>Créé le</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${utilisateurs}">
                    <td th:text="${u.id}"></td>
                    <td><strong th:text="${u.username}"></strong></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span th:each="r, stat : ${u.roles}">
                            <span th:text="${r.nom}" class="badge badge-info"></span>
                        </span>
                        <span th:if="${u.roles.isEmpty()}" style="color:#999;">Aucun rôle</span>
                    </td>
                    <td th:text="${u.dateCreation != null ? #temporals.format(u.dateCreation, 'dd/MM/yyyy') : '-'}"></td>
                    <td>
                        <a th:href="@{/admin/{id}/modifier(id=${u.id})}" class="btn btn-sm btn-primary">Modifier</a>

                        <!-- Changement rapide de mot de passe -->
                        <button type="button" class="btn btn-sm btn-secondary"
                                th:onclick="'document.getElementById(\'pwd-' + ${u.id} + '\').style.display=\'block\''">
                            🔑 MDP
                        </button>

                        <!-- Suppression -->
                        <form th:action="@{/admin/{id}/supprimer(id=${u.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-danger btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(utilisateurs)}">
                    <td colspan="6" style="text-align:center;color:#999;">Aucun utilisateur trouvé.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Formulaires inline de changement de mot de passe -->
    <div th:each="u : ${utilisateurs}">
        <div th:id="'pwd-' + ${u.id}"
             style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
                    background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
            <div style="background:white;border-radius:8px;padding:2rem;width:400px;max-width:90%;">
                <h3 style="margin-top:0;">Changer le mot de passe — <span th:text="${u.username}"></span></h3>
                <form th:action="@{/admin/{id}/password(id=${u.id})}" method="post">
                    <div class="form-group">
                        <label>Nouveau mot de passe (min. 6 caractères)</label>
                        <input type="password" name="nouveauMotDePasse" class="form-control"
                               minlength="6" required placeholder="Nouveau mot de passe">
                    </div>
                    <div style="display:flex;gap:0.75rem;margin-top:1rem;">
                        <button type="submit" class="btn btn-primary">Valider</button>
                        <button type="button" class="btn btn-secondary"
                                th:onclick="'document.getElementById(\'pwd-' + ${u.id} + '\').style.display=\'none\''">
                            Annuler
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Récapitulatif des rôles disponibles -->
    <div style="margin-top:2rem;">
        <h2>🎭 Rôles disponibles</h2>
        <div class="table-container" style="margin-top:0.75rem;">
            <table>
                <thead>
                    <tr><th>#</th><th>Nom du rôle</th><th>Module</th></tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${roles}">
                        <td th:text="${r.id}"></td>
                        <td><strong th:text="${r.nom}"></strong></td>
                        <td th:text="${r.module ?: '—'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
