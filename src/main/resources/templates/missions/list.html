<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Missions — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>🎯 Missions</h1>
        <a th:href="@{/missions/nouvelle}" class="btn btn-primary"
           sec:authorize="hasAnyAuthority('Gestionnaire Missions','Maitre Supreme')">
            + Nouvelle mission
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- Missions urgentes -->
    <div th:if="${!#lists.isEmpty(missionsUrgentes)}"
         style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:1rem;margin-bottom:1.5rem;">
        <h3 style="margin:0 0 0.75rem 0;color:#856404;">⚠️ Missions urgentes en cours</h3>
        <ul style="margin:0;padding-left:1.5rem;">
            <li th:each="m : ${missionsUrgentes}">
                <a th:href="@{/missions/{id}(id=${m.id})}" th:text="${m.titre}"></a>
                <span style="color:#dc3545;font-weight:600;"
                      th:text="' [' + ${m.niveauUrgence} + ' / ' + ${m.niveauGravite} + ']'"></span>
            </li>
        </ul>
    </div>

    <!-- Filtres -->
    <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;">
        <!-- Recherche texte -->
        <form method="get" th:action="@{/missions}" style="display:flex;gap:0.5rem;flex:1;">
            <input type="text" name="q" th:value="${q}" placeholder="Rechercher par titre ou itinéraire…"
                   style="flex:1;padding:0.5rem;border:1px solid #ddd;border-radius:6px;">
            <button type="submit" class="btn btn-secondary">Rechercher</button>
            <a th:href="@{/missions}" class="btn btn-secondary">Réinitialiser</a>
        </form>
        <!-- Filtre statut -->
        <form method="get" th:action="@{/missions}" style="display:flex;gap:0.5rem;align-items:center;">
            <select name="statut" style="padding:0.5rem;border:1px solid #ddd;border-radius:6px;">
                <option value="">— Tous les statuts —</option>
                <option th:each="s : ${statuts}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${s.name() == statutFiltre}"></option>
            </select>
            <button type="submit" class="btn btn-secondary">Filtrer</button>
        </form>
    </div>

    <!-- Tableau des missions -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Titre</th>
                    <th>Nature</th>
                    <th>Statut</th>
                    <th>Urgence</th>
                    <th>Gravité</th>
                    <th>Héros assignés</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="mission : ${missions}">
                    <td th:text="${mission.id}"></td>
                    <td><strong th:text="${mission.titre}"></strong></td>
                    <td th:text="${mission.nature}"></td>
                    <td>
                        <span th:text="${mission.statut}"
                              th:classappend="${mission.statut.name() == 'en_cours'} ? 'badge-success' :
                                             (${mission.statut.name() == 'planifiee'} ? 'badge-info' :
                                             (${mission.statut.name() == 'annulee'} ? 'badge-danger' : 'badge-secondary'))"
                              class="badge"></span>
                    </td>
                    <td>
                        <span th:text="${mission.niveauUrgence}"
                              th:classappend="${mission.niveauUrgence.name() == 'critique'} ? 'badge-danger' :
                                             (${mission.niveauUrgence.name() == 'eleve'} ? 'badge-warning' : 'badge-secondary')"
                              class="badge"></span>
                    </td>
                    <td th:text="${mission.niveauGravite}"></td>
                    <td>
                        <span th:if="${mission.superheros.isEmpty()}" style="color:#999;">—</span>
                        <span th:each="h,stat : ${mission.superheros}">
                            <span th:text="${h.nom}"></span><span th:if="${!stat.last}">, </span>
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/missions/{id}(id=${mission.id})}" class="btn btn-sm btn-secondary">Voir</a>
                        <a th:href="@{/missions/{id}/modifier(id=${mission.id})}" class="btn btn-sm btn-primary"
                           sec:authorize="hasAnyAuthority('Gestionnaire Missions','Maitre Supreme')">Modifier</a>
                        <form th:action="@{/missions/{id}/supprimer(id=${mission.id})}" method="post" style="display:inline"
                              sec:authorize="hasAuthority('Maitre Supreme')">
                            <button type="submit" class="btn btn-sm btn-danger btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(missions)}">
                    <td colspan="8" style="text-align:center;color:#999;">Aucune mission trouvée.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
