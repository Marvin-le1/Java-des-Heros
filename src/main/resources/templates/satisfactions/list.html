<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Satisfaction — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>⭐ Évaluations de satisfaction</h1>
        <a th:href="@{/satisfactions/nouveau}" class="btn btn-primary"
           sec:authorize="hasAnyAuthority('Gestionnaire Satisfaction','Maitre Supreme')">
            + Nouvelle évaluation
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Mission</th>
                    <th>Évalué par</th>
                    <th>Note</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${satisfactions}">
                    <td th:text="${s.id}"></td>
                    <td>
                        <a th:href="@{/missions/{id}(id=${s.mission.id})}" th:text="${s.mission.titre}"></a>
                    </td>
                    <td>
                        <span th:if="${s.civil != null}" th:text="${s.civil.nomComplet}"></span>
                        <span th:if="${s.civil == null}" style="color:#999;">Anonyme</span>
                    </td>
                    <td>
                        <strong th:text="${#numbers.formatDecimal(s.note, 1, 1)} + ' / 5'"></strong>
                        <span th:text="${s.note >= 4} ? '⭐⭐⭐⭐⭐' : (${s.note >= 3} ? '⭐⭐⭐⭐' : (${s.note >= 2} ? '⭐⭐⭐' : '⭐⭐'))"></span>
                    </td>
                    <td th:text="${s.dateEvaluation != null ? #temporals.format(s.dateEvaluation, 'dd/MM/yyyy') : '—'}"></td>
                    <td>
                        <a th:href="@{/satisfactions/{id}(id=${s.id})}" class="btn btn-sm btn-secondary">Voir</a>
                        <form th:action="@{/satisfactions/{id}/supprimer(id=${s.id})}" method="post" style="display:inline"
                              sec:authorize="hasAuthority('Maitre Supreme')">
                            <button type="submit" class="btn btn-sm btn-danger btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(satisfactions)}">
                    <td colspan="6" style="text-align:center;color:#999;">Aucune évaluation enregistrée.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
