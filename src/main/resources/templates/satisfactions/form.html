<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle évaluation — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>⭐ Nouvelle évaluation</h1>
        <a th:href="@{/satisfactions}" class="btn btn-secondary">← Retour</a>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="form-container">
        <form th:action="@{/satisfactions/sauvegarder}" th:object="${satisfaction}" method="post">

            <div class="form-group">
                <label for="missionId">Mission évaluée *</label>
                <select id="missionId" name="missionId" class="form-control" required>
                    <option value="">— Sélectionner une mission terminée —</option>
                    <option th:each="m : ${missions}"
                            th:value="${m.id}"
                            th:text="${m.titre + ' [' + m.statut + ']'}"
                            th:selected="${missionPreselect != null and missionPreselect == m.id}"
                            th:disabled="${m.statut.name() != 'terminee'}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="civilId">Civil évaluateur (optionnel)</label>
                <select id="civilId" name="civilId" class="form-control">
                    <option value="">— Anonyme —</option>
                    <option th:each="c : ${civils}" th:value="${c.id}" th:text="${c.nomComplet}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="note">Note (0 à 5) *</label>
                <input type="number" id="note" th:field="*{note}" class="form-control"
                       min="0" max="5" step="0.5" required>
                <span th:if="${#fields.hasErrors('note')}" th:errors="*{note}" class="field-error"></span>
            </div>

            <div class="form-group">
                <label for="commentaire">Commentaire</label>
                <textarea id="commentaire" th:field="*{commentaire}" class="form-control" rows="4"
                          placeholder="Retour d'expérience, suggestions…"></textarea>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                <a th:href="@{/satisfactions}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
