<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isNew} ? 'Nouveau héros' : 'Modifier héros'">Formulaire héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <h1 th:text="${isNew} ? '🦸 Nouveau super-héros' : '✏️ Modifier — ' + ${hero.nom}"></h1>

    <form th:action="@{/superheros/sauvegarder}" th:object="${hero}" method="post" style="max-width:600px;">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="nom">Nom du héros *</label>
            <input type="text" id="nom" th:field="*{nom}" placeholder="Ex : Iron Man" required>
            <span th:if="${#fields.hasErrors('nom')}" style="color:red;font-size:0.85rem;" th:errors="*{nom}"></span>
        </div>

        <div class="form-group">
            <label for="civilId">Identité secrète (Civil) *</label>
            <select id="civilId" name="civilId" required>
                <option value="">-- Sélectionner un civil --</option>
                <option th:each="civil : ${civils}"
                        th:value="${civil.id}"
                        th:text="${civil.nomComplet}"
                        th:selected="${hero.identiteSecrete != null and hero.identiteSecrete.id == civil.id}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="pouvoir">Pouvoir(s) *</label>
            <textarea id="pouvoir" th:field="*{pouvoir}" rows="3"
                      placeholder="Ex : Armure propulsée, missiles, IA intégrée…" required></textarea>
            <span th:if="${#fields.hasErrors('pouvoir')}" style="color:red;font-size:0.85rem;" th:errors="*{pouvoir}"></span>
        </div>

        <div class="form-group">
            <label for="pointFaible">Point faible</label>
            <textarea id="pointFaible" th:field="*{pointFaible}" rows="2"
                      placeholder="Ex : Alcool, arc réacteur endommagé…"></textarea>
        </div>

        <div class="form-group">
            <label for="commentaire">Commentaire</label>
            <textarea id="commentaire" th:field="*{commentaire}" rows="3"
                      placeholder="Informations complémentaires…"></textarea>
        </div>

        <div style="display:flex;gap:1rem;margin-top:1.5rem;">
            <button type="submit" class="btn btn-primary">
                <span th:text="${isNew} ? 'Créer le héros' : 'Enregistrer les modifications'"></span>
            </button>
            <a th:href="@{/superheros}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
