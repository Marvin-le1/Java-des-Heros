<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="~{::title}">Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <div class="nav-brand">
        <a th:href="@{/dashboard}">⚡ Java des Héros</a>
    </div>
    <ul class="nav-links">
        <li><a th:href="@{/civils}">Civils</a></li>
        <li><a th:href="@{/organisations}">Organisations</a></li>
        <li><a th:href="@{/superheros}">Super-héros</a></li>
        <li><a th:href="@{/supervilains}">Super-vilains</a></li>
        <li><a th:href="@{/incidents}">Incidents</a></li>
        <li><a th:href="@{/missions}">Missions</a></li>
        <li><a th:href="@{/rapports}">Rapports</a></li>
        <li><a th:href="@{/satisfactions}">Satisfaction</a></li>
        <li><a th:href="@{/crises}">Crises</a></li>
        <li><a th:href="@{/litiges}">Litiges</a></li>
        <li sec:authorize="hasAuthority('Maitre Supreme')"><a th:href="@{/admin}">Admin ⚙️</a></li>
    </ul>
    <div class="nav-user">
        <span sec:authentication="name">Utilisateur</span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit">Déconnexion</button>
        </form>
    </div>
</nav>

<main th:replace="~{::main}">
    Contenu principal
</main>

<footer>
    <p>Java des Héros — CRM Avengers | INFDIET10</p>
</footer>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
