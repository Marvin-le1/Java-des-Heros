<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Litiges — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>⚖️ Litiges</h1>
        <a th:href="@{/litiges/nouveau}" class="btn btn-primary"
           sec:authorize="hasAnyAuthority('Gestionnaire Litiges','Maitre Supreme')">
            + Nouveau litige
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <form method="get" th:action="@{/litiges}" style="margin-bottom:1rem;display:flex;gap:0.5rem;">
        <input type="text" name="q" th:value="${q}" placeholder="Rechercher par titre…"
               style="flex:1;padding:0.5rem;border:1px solid #ddd;border-radius:6px;">
        <button type="submit" class="btn btn-secondary">Rechercher</button>
        <a th:href="@{/litiges}" class="btn btn-secondary">Réinitialiser</a>
    </form>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Titre</th>
                    <th>Type</th>
                    <th>Statut</th>
                    <th>Plaignant</th>
                    <th>Héros mis en cause</th>
                    <th>Mission</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="litige : ${litiges}">
                    <td th:text="${litige.id}"></td>
                    <td><strong th:text="${litige.titre}"></strong></td>
                    <td th:text="${litige.typeLitige}"></td>
                    <td>
                        <span th:text="${litige.statut}"
                              th:classappend="${litige.statut.name() == 'ouvert'} ? 'badge-danger' :
                                             (${litige.statut.name() == 'en_instruction'} ? 'badge-warning' :
                                             (${litige.statut.name() == 'resolu'} ? 'badge-success' : 'badge-secondary'))"
                              class="badge"></span>
                    </td>
                    <td>
                        <a th:if="${litige.plaignant != null}"
                           th:href="@{/civils/{id}(id=${litige.plaignant.id})}"
                           th:text="${litige.plaignant.nomComplet}"></a>
                        <span th:if="${litige.plaignant == null}" style="color:#999;">—</span>
                    </td>
                    <td>
                        <a th:if="${litige.superhero != null}"
                           th:href="@{/superheros/{id}(id=${litige.superhero.id})}"
                           th:text="${litige.superhero.nom}"></a>
                        <span th:if="${litige.superhero == null}" style="color:#999;">—</span>
                    </td>
                    <td>
                        <a th:if="${litige.mission != null}"
                           th:href="@{/missions/{id}(id=${litige.mission.id})}"
                           th:text="${#strings.abbreviate(litige.mission.titre, 30)}"></a>
                        <span th:if="${litige.mission == null}" style="color:#999;">—</span>
                    </td>
                    <td>
                        <a th:href="@{/litiges/{id}(id=${litige.id})}" class="btn btn-sm btn-secondary">Voir</a>
                        <a th:href="@{/litiges/{id}/modifier(id=${litige.id})}" class="btn btn-sm btn-primary"
                           sec:authorize="hasAnyAuthority('Gestionnaire Litiges','Maitre Supreme')">Modifier</a>
                        <form th:action="@{/litiges/{id}/supprimer(id=${litige.id})}" method="post" style="display:inline"
                              sec:authorize="hasAuthority('Maitre Supreme')">
                            <button type="submit" class="btn btn-sm btn-danger btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(litiges)}">
                    <td colspan="8" style="text-align:center;color:#999;">Aucun litige enregistré.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
