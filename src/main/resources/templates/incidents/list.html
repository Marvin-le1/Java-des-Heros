<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Incidents — Java des Héros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1>🚨 Incidents</h1>
        <a th:href="@{/incidents/nouveau}" class="btn btn-primary"
           sec:authorize="hasAnyAuthority('Gestionnaire Incidents','Maitre Supreme')">
            + Déclarer un incident
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <form method="get" th:action="@{/incidents}" style="margin-bottom:1rem;display:flex;gap:0.5rem;">
        <input type="text" name="q" th:value="${q}" placeholder="Rechercher par titre ou lieu…"
               style="flex:1;padding:0.5rem;border:1px solid #ddd;border-radius:6px;">
        <button type="submit" class="btn btn-secondary">Rechercher</button>
        <a th:href="@{/incidents}" class="btn btn-secondary">Réinitialiser</a>
    </form>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Titre</th>
                    <th>Statut</th>
                    <th>Lieu</th>
                    <th>Déclarant</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inc : ${incidents}">
                    <td th:text="${inc.id}"></td>
                    <td><strong th:text="${inc.titre}"></strong></td>
                    <td>
                        <span th:text="${inc.statut}"
                              th:classappend="${inc.statut.name() == 'en_attente'} ? 'badge-warning' :
                                             (${inc.statut.name() == 'transforme_en_mission'} ? 'badge-success' : 'badge-secondary')"
                              class="badge"></span>
                    </td>
                    <td th:text="${inc.lieu ?: '—'}"></td>
                    <td>
                        <span th:if="${inc.declarantCivil != null}" th:text="${inc.declarantCivil.nomComplet}"></span>
                        <span th:if="${inc.declarantOrganisation != null}" th:text="${inc.declarantOrganisation.nom}"></span>
                        <span th:if="${inc.declarantHero != null}" th:text="${inc.declarantHero.nom}"></span>
                        <span th:if="${inc.declarantCivil == null and inc.declarantOrganisation == null and inc.declarantHero == null}"
                              style="color:#999;">Anonyme</span>
                    </td>
                    <td th:text="${inc.dateDeclaration != null ? #temporals.format(inc.dateDeclaration, 'dd/MM/yyyy') : '—'}"></td>
                    <td>
                        <a th:href="@{/incidents/{id}(id=${inc.id})}" class="btn btn-sm btn-secondary">Voir</a>
                        <a th:href="@{/incidents/{id}/modifier(id=${inc.id})}" class="btn btn-sm btn-primary"
                           sec:authorize="hasAnyAuthority('Gestionnaire Incidents','Maitre Supreme')">Modifier</a>
                        <a th:href="@{/missions/nouvelle(incidentId=${inc.id})}" class="btn btn-sm btn-secondary"
                           th:if="${inc.statut.name() == 'en_attente'}"
                           sec:authorize="hasAnyAuthority('Gestionnaire Missions','Maitre Supreme')"
                           title="Transformer en mission">🎯</a>
                        <form th:action="@{/incidents/{id}/supprimer(id=${inc.id})}" method="post" style="display:inline"
                              sec:authorize="hasAuthority('Maitre Supreme')">
                            <button type="submit" class="btn btn-sm btn-danger btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(incidents)}">
                    <td colspan="7" style="text-align:center;color:#999;">Aucun incident déclaré.</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
