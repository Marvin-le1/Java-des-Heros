<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${isNew} ? 'Déclarer un incident' : 'Modifier incident' + ' — Java des Héros'">Incident</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1 th:text="${isNew} ? '🚨 Déclarer un incident' : '✏️ Modifier l\'incident'">Incident</h1>
        <a th:href="@{/incidents}" class="btn btn-secondary">← Retour</a>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="form-container">
        <form th:action="@{/incidents/sauvegarder}" th:object="${incident}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="titre">Titre de l'incident *</label>
                <input type="text" id="titre" th:field="*{titre}" class="form-control"
                       placeholder="Ex : Attaque sur Times Square" required>
                <span th:if="${#fields.hasErrors('titre')}" th:errors="*{titre}" class="field-error"></span>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label for="lieu">Lieu</label>
                    <input type="text" id="lieu" th:field="*{lieu}" class="form-control"
                           placeholder="Ex : Manhattan, New York">
                </div>
                <div class="form-group" th:if="${!isNew}">
                    <label for="statut">Statut</label>
                    <select id="statut" th:field="*{statut}" class="form-control">
                        <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}"></option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" class="form-control" rows="4"
                          placeholder="Décrivez l'incident en détail…"></textarea>
            </div>

            <!-- Déclarant -->
            <h3 style="margin:1rem 0 0.5rem 0;color:#2c3e50;">Déclarant (optionnel)</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label for="declarantCivilId">Civil déclarant</label>
                    <select id="declarantCivilId" name="declarantCivilId" class="form-control">
                        <option value="">— Aucun —</option>
                        <option th:each="c : ${civils}"
                                th:value="${c.id}"
                                th:text="${c.nomComplet}"
                                th:selected="${incident.declarantCivil != null and incident.declarantCivil.id == c.id}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="declarantOrganisationId">Organisation déclarante</label>
                    <select id="declarantOrganisationId" name="declarantOrganisationId" class="form-control">
                        <option value="">— Aucune —</option>
                        <option th:each="o : ${organisations}"
                                th:value="${o.id}"
                                th:text="${o.nom}"
                                th:selected="${incident.declarantOrganisation != null and incident.declarantOrganisation.id == o.id}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="declarantHeroId">Super-héros déclarant</label>
                    <select id="declarantHeroId" name="declarantHeroId" class="form-control">
                        <option value="">— Aucun —</option>
                        <option th:each="h : ${superheros}"
                                th:value="${h.id}"
                                th:text="${h.nom}"
                                th:selected="${incident.declarantHero != null and incident.declarantHero.id == h.id}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="commentaire">Commentaire interne</label>
                <textarea id="commentaire" th:field="*{commentaire}" class="form-control" rows="3"
                          placeholder="Notes internes, suivi…"></textarea>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                <a th:href="@{/incidents}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
