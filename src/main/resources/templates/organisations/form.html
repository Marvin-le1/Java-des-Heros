<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${isNew} ? 'Nouvelle organisation' : 'Modifier organisation' + ' — Java des Héros'">Organisation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{shared/nav :: nav}"></nav>

<main>
    <div class="actions-bar">
        <h1 th:text="${isNew} ? '🏢 Nouvelle organisation' : '✏️ Modifier l\'organisation'">Organisation</h1>
        <a th:href="@{/organisations}" class="btn btn-secondary">← Retour</a>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="form-container">
        <form th:action="@{/organisations/sauvegarder}" th:object="${organisation}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="nom">Nom de l'organisation *</label>
                <input type="text" id="nom" th:field="*{nom}" class="form-control"
                       placeholder="Ex : S.H.I.E.L.D." required>
                <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="field-error"></span>
            </div>

            <div class="form-group">
                <label for="dirigeantId">Dirigeant</label>
                <select id="dirigeantId" name="dirigeantId" class="form-control">
                    <option value="">— Aucun dirigeant —</option>
                    <option th:each="civil : ${civils}"
                            th:value="${civil.id}"
                            th:text="${civil.nomComplet}"
                            th:selected="${organisation.dirigeant != null and organisation.dirigeant.id == civil.id}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="adresseSiege">Adresse du siège</label>
                <textarea id="adresseSiege" th:field="*{adresseSiege}" class="form-control" rows="2"
                          placeholder="Ex : Helicarrier, Atlantique Nord"></textarea>
            </div>

            <div class="form-group">
                <label for="commentaire">Commentaire</label>
                <textarea id="commentaire" th:field="*{commentaire}" class="form-control" rows="3"
                          placeholder="Notes sur cette organisation…"></textarea>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                <a th:href="@{/organisations}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</main>

<footer><p>Java des Héros — CRM Avengers | INFDIET10</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
